<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Energy - B2B SaaS</title>
  <meta name="description" content="Next-generation B2B Energy Management Platform">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Page -->
  <div id="login-page" class="page active">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    
    <div class="login-container glass-panel">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#00f2fe" />
              <stop offset="100%" stop-color="#4facfe" />
            </linearGradient>
          </defs>
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
        </svg>
        <h1>Nexus Energy</h1>
      </div>
      <p class="subtitle">Enter your credentials to access the portal</p>
      
      <form id="login-form">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="admin or demo" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="error-msg"></div>
        <button type="submit" class="btn primary-btn" id="login-btn">
          <span>Sign In</span>
          <div class="loader hidden" id="login-loader"></div>
        </button>
      </form>
    </div>
  </div>

  <!-- Dashboard Page -->
  <div id="dashboard-page" class="page hidden">
    <nav class="navbar glass-panel">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
        </svg>
        <h2>Nexus Energy</h2>
      </div>
      <div class="user-profile">
        <span id="user-company" class="company-badge">Loading...</span>
        <button id="logout-btn" class="btn secondary-btn">Sign Out</button>
      </div>
    </nav>

    <main class="dashboard-content">
      <header class="dashboard-header">
        <div>
          <h1>Real-time Telemetry</h1>
          <p class="date-display" id="current-date">Fetching data...</p>
        </div>
        <button id="generate-billing-btn" class="btn primary-btn pulse">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          Generate Invoice
        </button>
      </header>

      <div id="toast" class="toast hidden"></div>

      <div class="stats-grid">
        <div class="stat-card glass-panel">
          <h3>Total Consumption</h3>
          <div class="stat-value"><span id="total-consumption">--</span> <span class="unit">kWh</span></div>
          <div class="stat-trend positive">↑ 12% vs last month</div>
        </div>
        <div class="stat-card glass-panel">
          <h3>Peak Demand</h3>
          <div class="stat-value"><span id="peak-demand">--</span> <span class="unit">kW</span></div>
          <div class="stat-trend negative">↓ 3% vs last month</div>
        </div>
        <div class="stat-card glass-panel">
          <h3>Active Sensors</h3>
          <div class="stat-value">24 <span class="unit">Nodes</span></div>
          <div class="stat-trend neutral">All systems nominal</div>
        </div>
      </div>

      <div class="chart-container glass-panel">
        <div class="chart-header">
          <h3>Hourly Energy Consumption</h3>
        </div>
        <div class="chart-wrapper">
          <canvas id="telemetryChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
